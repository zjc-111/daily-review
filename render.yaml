services:
  - type: web
    name: daily-review-api
    runtime: python
    rootDir: server-py
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: "1"
      - key: DB_PATH
        value: data/app.db
      - key: LLM_ENDPOINT
        value: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - key: LLM_MODEL
        value: qwen-plus
      - key: AI_API_KEY
        sync: false
