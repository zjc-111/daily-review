services:
  - type: web
    name: daily-review-api
    runtime: python
    rootDir: server-py
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: "1"
      - key: DB_PATH
        value: data/app.db
